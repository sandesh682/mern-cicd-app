version: "3.9"

services:
  server:
    image: sandeshnangare/mern-server:latest
    container_name: mern_server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - mern_network

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8000/api/todos', r => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    image: sandeshnangare/mern-client:latest
    container_name: mern_client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: always
    networks:
      - mern_network

networks:
  mern_network:
    driver: bridge
