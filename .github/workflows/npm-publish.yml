name: MERN CI/CD Deploy

on:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'server/')

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t sandeshnangare/mern-server:${{ github.sha }} \
          -t sandeshnangare/mern-server:latest \
          ./server \
          --push

  frontend:
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'client/')

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker buildx build \
          --platform linux/amd64,linux/arm64 \
          -t sandeshnangare/mern-client:${{ github.sha }} \
          -t sandeshnangare/mern-client:latest \
          ./client \
          --push
